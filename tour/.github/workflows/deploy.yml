# 推送到 main 時：build → 將 dist 推到 gh-pages 分支
# GitHub Pages：Settings → Pages → Source 選「Deploy from a branch」
# Branch 選 gh-pages，資料夾選 / (root)。網址：https://yunahsuya.github.io/tour/

name: Deploy

on:
  push:
    branches: [main]

# 沒有 write 權限時，無法 push 到 gh-pages，部署會失敗
permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
