# 倉庫根目錄在「外層」，Vite 專案在子資料夾 tour/ — GitHub 只會讀這裡的 workflows
# 網址：https://yunahsuya.github.io/tour/
# Settings → Pages → Build and deployment → Source 請選「GitHub Actions」

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tour/package-lock.json

      - name: Install and build
        working-directory: tour
        run: |
          # 避免 lock 在 Windows 產生時與 Linux optional 套件不一致導致 npm ci 失敗
          npm install --no-audit --no-fund
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tour/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
